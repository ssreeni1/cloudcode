name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-daemon:
    name: Build daemon (${{ matrix.target }})
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build daemon
        run: cargo zigbuild --release -p cloudcode-daemon --target ${{ matrix.target }}

      - name: Generate checksum
        run: |
          mkdir -p target/daemon-binaries/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/cloudcode-daemon target/daemon-binaries/${{ matrix.target }}/cloudcode-daemon
          (cd target/daemon-binaries && shasum -a 256 ${{ matrix.target }}/cloudcode-daemon > ${{ matrix.target }}.sha256)

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: daemon-${{ matrix.target }}
          path: target/daemon-binaries/${{ matrix.target }}/cloudcode-daemon

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: daemon-${{ matrix.target }}-sha256
          path: target/daemon-binaries/${{ matrix.target }}.sha256

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: build-daemon
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: daemon-x86_64-unknown-linux-gnu
          path: target/daemon-binaries/x86_64-unknown-linux-gnu/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: daemon-aarch64-unknown-linux-gnu
          path: target/daemon-binaries/aarch64-unknown-linux-gnu/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: daemon-x86_64-unknown-linux-gnu-sha256
          path: target/daemon-binaries/

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: daemon-aarch64-unknown-linux-gnu-sha256
          path: target/daemon-binaries/

      - name: Combine daemon checksums
        run: |
          cat target/daemon-binaries/*.sha256 > target/daemon-binaries/SHA256SUMS
          cat target/daemon-binaries/SHA256SUMS

      - name: Build CLI (native)
        if: (matrix.target == 'aarch64-apple-darwin' && runner.arch == 'ARM64') || (matrix.target == 'x86_64-unknown-linux-gnu' && runner.os == 'Linux' && runner.arch == 'X64')
        env:
          CLOUDCODE_EMBED_DAEMONS: "1"
          CLOUDCODE_REQUIRE_EMBEDDED_DAEMONS: "1"
        run: cargo build --release -p cloudcode-cli --target ${{ matrix.target }}

      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        if: ${{ !((matrix.target == 'aarch64-apple-darwin' && runner.arch == 'ARM64') || (matrix.target == 'x86_64-unknown-linux-gnu' && runner.os == 'Linux' && runner.arch == 'X64')) }}

      - name: Install cargo-zigbuild
        if: ${{ !((matrix.target == 'aarch64-apple-darwin' && runner.arch == 'ARM64') || (matrix.target == 'x86_64-unknown-linux-gnu' && runner.os == 'Linux' && runner.arch == 'X64')) }}
        run: cargo install cargo-zigbuild

      - name: Build CLI (cross)
        if: ${{ !((matrix.target == 'aarch64-apple-darwin' && runner.arch == 'ARM64') || (matrix.target == 'x86_64-unknown-linux-gnu' && runner.os == 'Linux' && runner.arch == 'X64')) }}
        env:
          CLOUDCODE_EMBED_DAEMONS: "1"
          CLOUDCODE_REQUIRE_EMBEDDED_DAEMONS: "1"
        run: cargo zigbuild --release -p cloudcode-cli --target ${{ matrix.target }}

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cli-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/cloudcode

  release:
    name: Create Release
    needs: build-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          for dir in artifacts/cli-*/; do
            target=$(basename "$dir" | sed 's/cli-//')
            cp "$dir/cloudcode" "release/cloudcode-${target}"
            chmod +x "release/cloudcode-${target}"
          done
          (cd release && shasum -a 256 cloudcode-* > SHA256SUMS)
          ls -la release/
          cat release/SHA256SUMS

      - uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda
        with:
          files: |
            release/cloudcode-*
            release/SHA256SUMS
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          SHA_ARM_MAC=$(grep 'aarch64-apple-darwin' release/SHA256SUMS | awk '{print $1}')
          SHA_X86_MAC=$(grep 'x86_64-apple-darwin' release/SHA256SUMS | awk '{print $1}')
          SHA_ARM_LINUX=$(grep 'aarch64-unknown-linux-gnu' release/SHA256SUMS | awk '{print $1}')
          SHA_X86_LINUX=$(grep 'x86_64-unknown-linux-gnu' release/SHA256SUMS | awk '{print $1}')

          cat > /tmp/cloudcode.rb << FORMULA
          class Cloudcode < Formula
            desc "Persistent cloud Claude Code sessions on Hetzner VPS"
            homepage "https://github.com/ssreeni1/cloudcode"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/ssreeni1/cloudcode/releases/download/${TAG}/cloudcode-aarch64-apple-darwin"
                sha256 "${SHA_ARM_MAC}"
              end
              on_intel do
                url "https://github.com/ssreeni1/cloudcode/releases/download/${TAG}/cloudcode-x86_64-apple-darwin"
                sha256 "${SHA_X86_MAC}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/ssreeni1/cloudcode/releases/download/${TAG}/cloudcode-aarch64-unknown-linux-gnu"
                sha256 "${SHA_ARM_LINUX}"
              end
              on_intel do
                url "https://github.com/ssreeni1/cloudcode/releases/download/${TAG}/cloudcode-x86_64-unknown-linux-gnu"
                sha256 "${SHA_X86_LINUX}"
              end
            end

            def install
              binary = Dir.glob("cloudcode*").first
              bin.install binary => "cloudcode"
            end

            test do
              assert_match "cloudcode", shell_output("#{bin}/cloudcode --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/cloudcode.rb

          git clone https://x-access-token:${GH_TOKEN}@github.com/ssreeni1/homebrew-tap.git /tmp/homebrew-tap
          cp /tmp/cloudcode.rb /tmp/homebrew-tap/Formula/cloudcode.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cloudcode.rb
          git commit -m "Update cloudcode to ${VERSION}" || echo "No changes"
          git push
